name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-deb:
    name: Build Linux .deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Debian package
        run: npm run package:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: erikraft-drop-linux-deb
          path: dist/desktop/*.deb
          if-no-files-found: error

      - name: Attach Linux package to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/desktop/*.deb

  windows-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run package:windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: erikraft-drop-windows-exe
          path: dist/desktop/*.exe
          if-no-files-found: error

      - name: Attach Windows installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/desktop/*.exe
