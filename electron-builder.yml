appId: io.github.erikraft.Drop
productName: ErikrafT Drop
executableName: erikraft-drop
artifactName: ${name}-${version}-${os}-${arch}.${ext}
directories:
  output: dist/desktop
files:
  - desktop/**
  - server/**
  - public/**
  - package.json
extraMetadata:
  main: desktop/main.cjs
linux:
  target:
    - target: deb
      arch:
        - x64
  category: Network;Utility;
  icon: packaging/linux/icons/icon-drop.svg
  desktop:
    entry:
      Name: ErikrafT Drop
      Comment: File sharing by ErikrafT
      Icon: erikraft-drop
      Terminal: 'false'
      Type: Application
      Categories: Network;Utility;
      Keywords: file;transfer;sharing
deb:
  artifactName: erikraft-drop-linux-amd64.deb
  maintainer: ErikrafT <contact+app@erikraft.com>
  fpm:
    - packaging/linux/icons/icon-drop.svg=/usr/share/icons/hicolor/scalable/apps/erikraft-drop.svg
    - packaging/linux/icons/android-chrome-512x512.png=/usr/share/icons/hicolor/512x512/apps/erikraft-drop.png
    - packaging/linux/icons/android-chrome-512x512-maskable.png=/usr/share/icons/hicolor/512x512/apps/erikraft-drop-maskable.png
  packageName: erikraft-drop
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
win:
  target:
    - nsis
  icon: public/images/android-chrome-512x512.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ErikrafT Drop
